; Xdebug 3.3 configuration for Magento 2.4.7 development
; Toggle via XDEBUG_MODE env var (default: off)
; Values: off, debug, profile, trace, coverage
;
; Usage:
;   XDEBUG_MODE=debug  -> step debugging (PHPStorm/VSCode)
;   XDEBUG_MODE=profile -> generates cachegrind files in /tmp
;   XDEBUG_MODE=off     -> disabled (default, no performance hit)

zend_extension = xdebug

xdebug.mode = ${XDEBUG_MODE}
xdebug.start_with_request = yes
xdebug.client_host = host.docker.internal
xdebug.client_port = 9003
xdebug.idekey = PHPSTORM
xdebug.discover_client_host = true

; Profiler output (when mode=profile)
xdebug.output_dir = /tmp
xdebug.profiler_output_name = cachegrind.out.%p

; Log (useful for troubleshooting connection issues)
xdebug.log = /tmp/xdebug.log
xdebug.log_level = 3
