; SPX Profiler configuration
; https://github.com/NoiseByNorthwest/php-spx
;
; Access the web UI at: http://localhost/?SPX_KEY=dev&SPX_UI_URI=/
;
; Toggle profiling:
;   SPX_ENABLED=1 -> enable SPX
;   SPX_ENABLED=0 -> disable SPX (default)
;
; To profile a specific request, add ?SPX_KEY=dev&SPX_ENABLED=1 to the URL

spx.http_enabled = ${SPX_ENABLED}
spx.http_key = ${SPX_KEY}
spx.http_ip_whitelist = *
spx.http_trusted_proxies =
spx.http_profiling_enabled = 0
spx.http_profiling_auto_start = 0
