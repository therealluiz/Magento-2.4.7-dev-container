; Magento 2.4.7 PHP settings (development)
memory_limit = 4G
max_execution_time = 1800
max_input_time = 600
max_input_vars = 10000
post_max_size = 64M
upload_max_filesize = 64M

; Realpath cache (critical for Magento performance)
realpath_cache_size = 10M
realpath_cache_ttl = 7200

; Session
session.gc_maxlifetime = 86400
session.cookie_httponly = 1

; OPcache (dev-tuned: revalidate every request)
opcache.enable = 1
opcache.enable_cli = 1
opcache.memory_consumption = 512
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 65407
opcache.validate_timestamps = 1
opcache.revalidate_freq = 0
opcache.save_comments = 1
opcache.jit = off

; Error reporting (dev mode)
display_errors = On
display_startup_errors = On
error_reporting = E_ALL
log_errors = On

; Timezone
date.timezone = UTC

; Mail (via MailHog)
sendmail_path = "/usr/sbin/sendmail -t -i -S mailhog:1025"
