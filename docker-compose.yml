services:
  php:
    build:
      context: ./docker/php
      args:
        USER_ID: ${USER_ID:-1000}
        GROUP_ID: ${GROUP_ID:-1000}
    container_name: magento-php
    volumes:
      - ./src:/var/www/html:delegated
      - composer-cache:/home/magento/.composer
    environment:
      - COMPOSER_HOME=/home/magento/.composer
      - COMPOSER_AUTH=${COMPOSER_AUTH:-}
      - XDEBUG_MODE=${XDEBUG_MODE:-off}
      - PHP_IDE_CONFIG=serverName=magento
      - SPX_ENABLED=${SPX_ENABLED:-0}
      - SPX_KEY=${SPX_KEY:-dev}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      opensearch:
        condition: service_healthy
    networks:
      - magento

  nginx:
    image: nginx:1.24-alpine
    container_name: magento-nginx
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./src:/var/www/html:delegated
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
    networks:
      - magento

  db:
    image: mysql:8.0
    container_name: magento-db
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-magento}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-magento}
      - MYSQL_USER=${MYSQL_USER:-magento}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-magento}
    volumes:
      - db-data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/magento.cnf:ro
    tmpfs:
      - /tmp:size=512M
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-magento}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - magento

  opensearch:
    image: opensearchproject/opensearch:2.12.0
    container_name: magento-opensearch
    ports:
      - "${OPENSEARCH_PORT:-9200}:9200"
    environment:
      - discovery.type=single-node
      - plugins.security.disabled=true
      - bootstrap.memory_lock=true
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
      - DISABLE_INSTALL_DEMO_CONFIG=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\\|yellow\"'"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - magento

  redis:
    image: redis:7.2-alpine
    container_name: magento-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - magento

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: magento-rabbitmq
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MGMT_PORT:-15672}:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER:-magento}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASSWORD:-magento}
    networks:
      - magento

  mailhog:
    image: mailhog/mailhog:latest
    container_name: magento-mailhog
    ports:
      - "${MAILHOG_PORT:-8025}:8025"
      - "1025:1025"
    networks:
      - magento

volumes:
  db-data:
  opensearch-data:
  composer-cache:

networks:
  magento:
    driver: bridge
